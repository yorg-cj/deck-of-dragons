name: Daily Reading
# Generates today's oracle reading and commits it to docs/reading.json

"on":
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-deploy.txt') }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-v1

      - name: Install CPU PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-deploy.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Generate reading
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          WORLDNEWS_API_KEY: ${{ secrets.WORLDNEWS_API_KEY }}
        run: python scripts/generate_reading.py

      - name: Commit and push
        run: |
          git config user.name  'Deck of Dragons'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/reading.json
          git diff --staged --quiet || git commit -m "Reading: $(date -u +%Y-%m-%d)"
          git push
